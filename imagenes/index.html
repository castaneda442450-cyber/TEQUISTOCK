<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEQUISTOCK — Control de Inventarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAF8F5; color: #1C1714; -webkit-font-smoothing: antialiased; transition: background 0.2s ease, color 0.2s ease; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D0C8BF; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #B0A89E; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    @media print {
      .no-print { display: none !important; }
    }

    /* Force inputs/selects to respect theme colors */
    input, select, textarea {
      color-scheme: light dark;
    }
    [data-dark="true"] input,
    [data-dark="true"] select,
    [data-dark="true"] textarea {
      color-scheme: dark;
      background-color: #1C2028 !important;
      color: #E8EAF0 !important;
      border-color: #2E3444 !important;
    }
    [data-dark="true"] input::placeholder,
    [data-dark="true"] textarea::placeholder {
      color: #606880 !important;
    }
    [data-dark="true"] input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.5);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Data (plain JS, no Babel needed) -->
  <script src="data.js"></script>

  <!-- Shared components -->
  <script type="text/babel" src="shared.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="Login.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
  <script type="text/babel" src="Products.jsx"></script>
  <script type="text/babel" src="Suppliers.jsx"></script>
  <script type="text/babel" src="Purchases.jsx"></script>
  <script type="text/babel" src="Exits.jsx"></script>
  <script type="text/babel" src="Reports.jsx"></script>

  <!-- App root (mounts React) -->
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
